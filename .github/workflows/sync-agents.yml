name: Sync Agent Configs

on:
  push:
    branches: [master]
    paths:
      - 'agents/**'
      - '.github/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          token: ${{ secrets.PAT }}

      - name: Sync to openclaw-agents
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          # Clone openclaw-agents and update its agents/ directory
          git clone https://github.com/KJ77452361/openclaw-agents.git /tmp/openclaw-agents
          cd /tmp/openclaw-agents
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf agents/
          cp -r /tmp/openclaw-agents/agents /tmp/openclaw-agents/ 2>/dev/null || true
          cp -r /home/runner/work/openclaw-agents-config/openclaw-agents-config/src/agents .
          # Detect what changed
          if git diff --quiet HEAD; then
            echo "No agent changes to sync"
          else
            git add agents/
            git commit -m "sync: $(date -u +%Y-%m-%dT%H:%M:%SZ) — agent configs from openclaw-agents-config"
            git push origin master
            echo "✅ agents/ synced to openclaw-agents"
          fi

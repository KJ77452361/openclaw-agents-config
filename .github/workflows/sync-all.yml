name: Sync to openclaw-agents

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          persist-credentials: false

      - name: Push agent configs to openclaw-agents
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          SRC="$GITHUB_WORKSPACE/src"
          
          # Use raw curl to clone with embedded token
          git clone "https://x-access-token:${{ secrets.PAT }}@github.com/KJ77452361/openclaw-agents.git" /tmp/openclaw-agents 2>&1 | head -5
          cd /tmp/openclaw-agents
          
          for agent in ca ceo coo cto he pe pm qm rs sa se; do
            rm -rf "agents/$agent" 2>/dev/null || true
            if [ -d "$SRC/$agent" ]; then
              cp -r "$SRC/$agent" "agents/$agent"
            fi
          done

          git add agents/
          git diff --cached --quiet && echo "NO_CHANGES" || {
            git commit -m "sync: $(date -u +%Y-%m-%dT%H:%M:%SZ) — agents from openclaw-agents-config"
            git push origin master 2>&1 | head -10
          }

name: Sync to openclaw-agents

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          persist-credentials: false

      - name: Push agent configs to openclaw-agents
        run: |
          SRC="$GITHUB_WORKSPACE/src"
          echo "Source agents: $(ls $SRC/)"
          
          # Create a temp git repo for openclaw-agents and apply changes via gh cli
          WORKDIR=$(mktemp -d)
          git clone "https://x-access-token:${{ secrets.PAT }}@github.com/KJ77452361/openclaw-agents.git" "$WORKDIR"
          
          # Copy agents (src has: ca/, ceo/, coo/, etc. at root)
          # Target wants: agents/ca/, agents/ceo/, etc.
          rm -rf "$WORKDIR/agents/"
          mkdir -p "$WORKDIR/agents"
          for agent in ca ceo coo cto he pe pm qm rs sa se; do
            if [ -d "$SRC/$agent" ]; then
              cp -r "$SRC/$agent" "$WORKDIR/agents/$agent"
              echo "Copied $agent/"
            fi
          done

          cd "$WORKDIR"
          git add agents/
          git diff --cached --quiet && echo "NO_CHANGES" || {
            git commit -m "sync: $(date -u +%Y-%m-%dT%H:%M:%SZ) — agents from openclaw-agents-config"
            # Push using gh api instead of git
            gh api \
              --method PUT \
              -H "Authorization: Bearer ${{ secrets.PAT }}" \
              -H "Content-Type: application/json" \
              https://api.github.com/repos/KJ77452361/openclaw-agents/git/refs/heads/master \
              -F "sha=$(git rev-parse HEAD)" \
              && echo "PUSHED_VIA_API"
          }

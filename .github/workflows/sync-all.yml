name: Sync to openclaw-agents

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          persist-credentials: false

      - name: Push agent configs to openclaw-agents
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          
          SRC="$GITHUB_WORKSPACE/src"
          WORKDIR=$(mktemp -d)
          git clone "https://x-access-token:${{ secrets.PAT }}@github.com/KJ77452361/openclaw-agents.git" "$WORKDIR"
          
          # Copy agents (src has root-level dirs) to agents/ level in target
          rm -rf "$WORKDIR/agents/"
          mkdir -p "$WORKDIR/agents"
          for agent in ca ceo coo cto he pe pm qm rs sa se; do
            if [ -d "$SRC/$agent" ]; then
              cp -r "$SRC/$agent" "$WORKDIR/agents/$agent"
            fi
          done

          cd "$WORKDIR"
          git add agents/
          git diff --cached --quiet && echo "NO_CHANGES" || {
            git commit -m "sync: $(date -u +%Y-%m-%dT%H:%M:%SZ) — agents from openclaw-agents-config"
            git push origin master && echo "PUSHED_VIA_GIT"
          }

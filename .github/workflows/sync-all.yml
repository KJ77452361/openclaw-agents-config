name: Sync to openclaw-agents

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          persist-credentials: false

      - name: Push agent configs to openclaw-agents
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          SRC="$GITHUB_WORKSPACE/src"
          
          # Verify source agents exist
          echo "Source agents:"
          ls "$SRC/"
          
          # Clone target repo
          git clone "https://x-access-token:${{ secrets.PAT }}@github.com/KJ77452361/openclaw-agents.git" /tmp/openclaw-agents
          cd /tmp/openclaw-agents
          
          echo "Target agents/ before:"
          ls agents/ 2>/dev/null || echo "(empty or missing)"
          
          # Remove existing agents/ content and copy from source
          rm -rf agents/*
          cp -r "$SRC"/. agents/
          
          echo "Target agents/ after:"
          ls agents/
          
          echo "Git status:"
          git status --short
          
          git add agents/
          git diff --cached --stat
          
          git commit -m "sync: $(date -u +%Y-%m-%dT%H:%M:%SZ) — agents from openclaw-agents-config"
          git push origin master && echo "PUSH_SUCCESS"

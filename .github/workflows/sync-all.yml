name: Sync to openclaw-agents

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          persist-credentials: false

      - name: Push agent configs to openclaw-agents via API
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          SRC: ${{ github.workspace }}/src
        run: |
          # Build the file tree for openclaw-agents/agents/
          WORKDIR=$(mktemp -d)
          git clone "https://x-access-token:$GH_TOKEN@github.com/KJ77452361/openclaw-agents.git" "$WORKDIR"
          
          # Copy agents from src (root-level) to agents/ level
          rm -rf "$WORKDIR/agents/"
          mkdir -p "$WORKDIR/agents"
          for agent in ca ceo coo cto he pe pm qm rs sa se; do
            [ -d "$SRC/$agent" ] && cp -r "$SRC/$agent" "$WORKDIR/agents/$agent"
          done
          
          # Get current HEAD tree SHA
          HEAD_SHA=$(git -C "$WORKDIR" rev-parse HEAD)
          echo "Current HEAD: $HEAD_SHA"
          
          # Build new tree with agents/ content
          cd "$WORKDIR"
          git add agents/
          
          # Check if there are changes
          git diff --cached --quiet && echo "NO_CHANGES" && exit 0
          
          # Get the new tree SHA
          TREE_SHA=$(git write-tree)
          echo "New tree: $TREE_SHA"
          
          # Create commit
          COMMIT_MSG="sync: $(date -u +%Y-%m-%dT%H:%M:%SZ) — agents from openclaw-agents-config"
          NEW_COMMIT_SHA=$(git commit-tree "$TREE_SHA" -p "$HEAD_SHA" -m "$COMMIT_MSG")
          echo "New commit: $NEW_COMMIT_SHA"
          
          # Push using gh api
          gh api --method PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/KJ77452361/openclaw-agents/git/refs/heads/master" \
            -f sha="$HEAD_SHA" \
            -f "sha=$HEAD_SHA" \
            -F "message=$COMMIT_MSG" \
            -F "force=false" || \
          echo "PATCH failed, trying PUT"

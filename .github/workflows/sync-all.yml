name: Sync to openclaw-agents

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          persist-credentials: false

      - name: Push agent configs to openclaw-agents
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          
          SRC="$GITHUB_WORKSPACE/src"
          WORKDIR=$(mktemp -d)
          git clone "https://github.com/KJ77452361/openclaw-agents.git" "$WORKDIR"
          
          cd "$WORKDIR"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions Bot"
          
          rm -rf agents/
          mkdir -p agents
          for agent in ca ceo coo cto he pe pm qm rs sa se; do
            [ -d "$SRC/$agent" ] && cp -r "$SRC/$agent" agents/$agent
          done
          
          git add agents/
          git diff --cached --quiet && echo "NO_CHANGES" && exit 0
          
          HEAD_SHA=$(git rev-parse HEAD)
          TREE_SHA=$(git write-tree)
          COMMIT_MSG="sync: $(date -u +%Y-%m-%dT%H:%M:%SZ) — agents from openclaw-agents-config"
          NEW_COMMIT_SHA=$(git commit-tree "$TREE_SHA" -p "$HEAD_SHA" -m "$COMMIT_MSG")
          
          # Use secrets.PAT directly in URL for push
          git remote set-url origin "https://x-access-token:${{ secrets.PAT }}@github.com/KJ77452361/openclaw-agents.git"
          git push origin master && echo "SUCCESS"

name: Sync to openclaw-agents

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          persist-credentials: false

      - name: Debug token (redacted)
        run: echo "Token prefix: ${GITHUB_TOKEN:0:4}"

      - name: Push agent configs to openclaw-agents
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"

          SRC="$GITHUB_WORKSPACE/src"
          git clone https://x-access-token:$GITHUB_TOKEN@github.com/KJ77452361/openclaw-agents.git /tmp/openclaw-agents
          cd /tmp/openclaw-agents

          # agents-config: root-level dirs (ceo/, ca/, coo/, etc.)
          # openclaw-agents: agents/ level (agents/ceo/, agents/ca/, etc.)
          for agent in ca ceo coo cto he pe pm qm rs sa se; do
            rm -rf "agents/$agent"
            if [ -d "$SRC/$agent" ]; then
              cp -r "$SRC/$agent" "agents/$agent"
              echo "Synced $agent/"
            fi
          done

          git add agents/
          git diff --cached --quiet && echo "No agent changes" || {
            git commit -m "sync: $(date -u +%Y-%m-%dT%H:%M:%SZ) — agents from openclaw-agents-config"
            git push origin master && echo "✅ agents/ synced to openclaw-agents"
          }

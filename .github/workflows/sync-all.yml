name: Sync to openclaw-agents

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          persist-credentials: false

      - name: Debug token expansion
        run: |
          echo "=== Testing env var ==="
          echo "GITHUB_TOKEN length: ${#GITHUB_TOKEN}"
          echo "GITHUB_TOKEN first 4: ${GITHUB_TOKEN:0:4}"
          echo "=== Testing curl with PAT in Authorization header ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.PAT }}" \
            "https://api.github.com/repos/KJ77452361/openclaw-agents")
          echo "HTTP code: $HTTP_CODE"

name: Sync to openclaw-agents

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
          persist-credentials: false

      - name: Push agent configs to openclaw-agents
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"

          # agents-config repo structure: agents at ROOT (ceo/, ca/, coo/, cto/, he/, pe/, pm/, qm/, rs/, sa/, se/)
          # openclaw-agents: agents at agents/ level (agents/ceo/, agents/ca/, etc.)
          SRC=/home/runner/work/openclaw-agents-config/openclaw-agents-config/src

          git clone https://x-access-token:$GH_TOKEN@github.com/KJ77452361/openclaw-agents.git /tmp/openclaw-agents
          cd /tmp/openclaw-agents

          # Sync each agent (root-level dirs from src → agents/ level in target)
          for agent in ca ceo coo cto he pe pm qm rs sa se architect fullstack_engineer qa_engineer; do
            rm -rf agents/$agent 2>/dev/null
            if [ -d "$SRC/$agent" ]; then
              cp -r "$SRC/$agent" agents/$agent
              echo "Synced $agent/"
            fi
          done

          git add agents/
          git diff --cached --quiet && echo "No agent changes" || {
            git commit -m "sync: $(date -u +%Y-%m-%dT%H:%M:%SZ) — agents from openclaw-agents-config"
            git push origin master && echo "✅ agents/ synced to openclaw-agents"
          }
